  <rect width="100%" height="100%" fill="#F5F5DC"/>
  <rect x="20" y="20" width="100" height="60" fill="#0000FF" stroke="#00008B" stroke-width="2" rx="8" ry="0" opacity="1.0" clip-path="url(#canvas-clip)"/>
