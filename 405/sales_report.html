<!DOCTYPE html>

        <style>
            .excel-table {
                border-collapse: collapse;
                width: 100%;

                background-color: #4472C4;
                color: white;
                padding: 12px 15px;

            }
            .excel-table td {

                border: 1px solid #D4D4D4;
            }
            .excel-table tr:nth-child(even) {
                background-color: #F2F2F2;
            }
            .excel-table tr:hover {
                background-color: #E7F3FF;
            }
