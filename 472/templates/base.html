<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f4f4f7;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        }
        .email-wrapper {
            width: 100%;
            background-color: #f4f4f7;
            padding: 40px 0;
        }
        .email-container {
            max-width: 600px;
            margin: 0 auto;
            background-color: #ffffff;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }
        .email-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 30px 40px;
            text-align: center;
        }
        .email-header h1 {
            margin: 0;
            color: #ffffff;
            font-size: 24px;
            font-weight: 600;
        }
        .email-body {
            padding: 40px;
            color: #333333;
            font-size: 16px;
            line-height: 1.6;
        }
        .email-footer {
            background-color: #f8f9fa;
            padding: 20px 40px;
            text-align: center;
            border-top: 1px solid #e9ecef;
        }
        .email-footer p {
            margin: 4px 0;
            color: #888888;
            font-size: 12px;
        }
        .email-footer a {
            color: #667eea;
            text-decoration: none;
        }
        .btn {
            display: inline-block;
            padding: 12px 32px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #ffffff !important;
            text-decoration: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 500;
        }
        .highlight {
            background-color: #f0f0ff;
            border-left: 4px solid #667eea;
            padding: 12px 16px;
            margin: 16px 0;
            border-radius: 0 4px 4px 0;
        }
    </style>
</head>
<body>
    <div class="email-wrapper">
        <div class="email-container">
            <div class="email-header">
                <h1>{% block header_title %}{{ site_name }}{% endblock %}</h1>
            </div>
            <div class="email-body">
                {% block greeting %}<p>{{ user_name }}，您好！</p>{% endblock %}
                {% block content %}{% endblock %}
            </div>
            <div class="email-footer">
                {% block footer %}
                <p>此邮件由 {{ site_name }} 系统自动发送，请勿直接回复。</p>
                <p>&copy; {{ year }} {{ site_name }}. 保留所有权利。</p>
                {% endblock %}
            </div>
        </div>
    </div>
</body>
</html>
