<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Welcome</title>
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; }
        .header { background: #4a90d9; color: white; padding: 20px; text-align: center; }
        .content { padding: 20px; background: #f9f9f9; }
        .footer { text-align: center; padding: 10px; font-size: 12px; color: #999; }
        .button { display: inline-block; padding: 10px 20px; background: #4a90d9; color: white; text-decoration: none; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>欢迎加入我们！</h1>
        </div>
        <div class="content">
            <p>您好，{{ username }}！</p>
            <p>感谢您注册我们的服务。请点击下面的按钮完成验证：</p>
            <p style="text-align: center;">
                <a href="{{ verify_url }}" class="button">验证邮箱</a>
            </p>
            <p>如果按钮无法点击，请复制以下链接到浏览器：</p>
            <p style="word-break: break-all; color: #666;">{{ verify_url }}</p>
            <p>此链接将在 {{ expire_hours }} 小时后失效。</p>
            <p>如有任何问题，请联系我们的客服团队。</p>
            <p>此致，<br>{{ company_name }} 团队</p>
        </div>
        <div class="footer">
            <p>&copy; {{ year }} {{ company_name }}. All rights reserved.</p>
        </div>
    </div>
</body>
</html>
