<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Notification</title>
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; }
        .notification { background: #e8f4fd; border-left: 4px solid #4a90d9; padding: 15px; margin: 10px 0; }
        .important { background: #fff3cd; border-left: 4px solid #ffc107; }
        .success { background: #d4edda; border-left: 4px solid #28a745; }
        .footer { text-align: center; padding: 10px; font-size: 12px; color: #999; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>{{ title }}</h2>
        
        <div class="notification {{ level }}">
            <h3>{{ notification_title }}</h3>
        </div>
        
        <div class="content">
            {{ content }}
        </div>
        
        {% if details %}
        <div style="background: #f5f5f5; padding: 15px; margin-top: 15px;">
            <h4>详细信息：</h4>
            <ul>
            {% for key, value in details.items() %}
                <li><strong>{{ key }}:</strong> {{ value }}</li>
            {% endfor %}
            </ul>
        </div>
        {% endif %}
        
        {% if action_url %}
        <p style="text-align: center; margin-top: 20px;">
            <a href="{{ action_url }}" style="display: inline-block; padding: 10px 20px; background: #4a90d9; color: white; text-decoration: none; border-radius: 4px;">查看详情</a>
        </p>
        {% endif %}
        
        <div class="footer">
            <p>&copy; {{ year }} {{ company_name }}. All rights reserved.</p>
        </div>
    </div>
</body>
</html>
